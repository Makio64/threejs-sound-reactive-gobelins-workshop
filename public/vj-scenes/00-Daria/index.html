<!DOCTYPE html>
<html lang="en">
<!--
  COPY THIS FOLDER → public/vj-scenes/<your-name>/ and edit the script below.
  Any tech works; this example uses three.js (WebGL) from a CDN.

  Implement the lifecycle (all optional): load → warmup → play / stop.
  Read the audio from `audio`: volume · volumeSmooth · kick · volumeByFrequency.

  Independent: open this page on its own and it runs standalone (plays the same
  audio tracks and keyboard shortcuts). Embedded in the VJ host, the same code
  receives the master's broadcast instead- auto-detected, nothing to change.
-->

<head>
	<meta charset="utf-8">
	<style>
		html,
		body {
			margin: 0;
			height: 100%;
			background: #000;
			overflow: hidden;
		}

		canvas {
			display: block;
			width: 100%;
			height: 100%;
		}

		#vignette {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
			z-index: 999;
			background:
				radial-gradient(ellipse at center,

					rgba(0, 0, 0, 0) 25%,

					rgba(0, 0, 0, 0.1) 45%,

					rgba(0, 0, 0, 0.5) 65%,

					rgba(0, 0, 0, 0.95) 85%,

					rgba(0, 0, 0, 1) 100%);

		}

			#introFade {
				position: fixed;

				inset: 0;

				background: black;

				z-index: 9999;

				pointer-events: none;

				animation: introFade 4s ease-out forwards;
			}

			@keyframes introFade {
				0% {
					opacity: 1;
				}

				100% {
					opacity: 0;
					visibility: hidden;
				}
			} 
	</style>
	<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
    "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js"
  }
}
</script>
</head>

<body>
	<div id="vignette"></div>
	<script type="module" src="main.js"></script>
	<div id="introFade"></div>
</body>

</html>
